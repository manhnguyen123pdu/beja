<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giáo trình Java</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --light-color: #ecf0f1;
            --dark-color: #34495e;
            --success-color: #2ecc71;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1.5rem 0;
            box-shadow: var(--box-shadow);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 1.5rem;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            padding: 0.5rem 0.8rem;
            border-radius: var(--border-radius);
        }

        nav ul li a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .main-content {
            padding: 2rem 0;
        }

        .page-title {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--secondary-color);
        }

        .page-title h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .page-title p {
            font-size: 1.1rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .lesson-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--box-shadow);
            transition: var(--transition);
            cursor: pointer;
        }

        .lesson-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .lesson-number {
            background: var(--primary-color);
            color: white;
            padding: 0.8rem;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .lesson-content {
            padding: 1.5rem;
        }

        .lesson-title {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            color: var(--secondary-color);
        }

        .lesson-meta {
            display: flex;
            justify-content: space-between;
            color: #777;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .lesson-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-completed {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--success-color);
        }

        .status-in-progress {
            background-color: rgba(52, 152, 219, 0.2);
            color: var(--primary-color);
        }

        .status-not-started {
            background-color: rgba(149, 165, 166, 0.2);
            color: #95a5a6;
        }

        footer {
            background-color: var(--secondary-color);
            color: white;
            padding: 2rem 0;
            margin-top: 2rem;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .footer-section {
            flex: 1;
            min-width: 250px;
            margin-bottom: 1.5rem;
        }

        .footer-section h3 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .footer-section p,
        .footer-section a {
            color: #bdc3c7;
            margin-bottom: 0.5rem;
            display: block;
            text-decoration: none;
            transition: var(--transition);
        }

        .footer-section a:hover {
            color: white;
        }

        .copyright {
            text-align: center;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 1rem;
            color: #95a5a6;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            nav ul {
                margin-top: 1rem;
                justify-content: center;
            }

            nav ul li {
                margin: 0 0.5rem;
            }

            .page-title h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">📚 Giáo trình JAVA</div>
                <nav>
                    <ul>
                        <li><a href="#">Trang chủ</a></li>
                        <li><a href="#">Khóa học</a></li>
                        <li><a href="#">Bài học</a></li>
                        <li><a href="#">Thảo luận</a></li>
                        <li><a href="#">Liên hệ</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="page-title">
                <h1>Khóa Học Lập Trình BE JAVA</h1>
            </div>

            <!-- Lessons Grid -->
            <div class="lessons-grid">
                <!-- Bài học 1 -->
                <div class="lesson-card">
                    <div class="lesson-number">Bài 1</div>
                    <div class="lesson-content">
                        <h3 style="text-transform: uppercase;" class="lesson-title">GIỚI THIỆU JAVA SERVLET</h3>
                        <div class="lesson-meta">
                            <span>Thời lượng: 120 phút</span>
                            <a href="./LS1.html">Vào bài học</a>
                        </div>
                    </div>
                </div>
                <div class="lesson-card">
                    <div class="lesson-number">Bài 2</div>
                    <div class="lesson-content">
                        <h3 style="text-transform: uppercase;" class="lesson-title">REQUEST, RESPONSE</h3>
                        <div class="lesson-meta">
                            <span>Thời lượng: 120 phút</span>
                            <a href="./LS1.html">Vào bài học</a>
                        </div>
                    </div>
                </div>
                
    </main>


    <!-- Footer -->
    <footer>
        <div class="container">
          
            <div class="copyright">
                &copy;  GV: Nguyễn Đình Mạnh
            </div>
        </div>
    </footer>
</body>

</html>
